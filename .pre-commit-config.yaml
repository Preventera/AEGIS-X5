repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [pyyaml]
        args: [--ignore-missing-imports]
        pass_filenames: false
        entry: mypy src/aegis/

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (fast)
        entry: python -m pytest tests/ -x --tb=short -q -m "not slow"
        language: system
        pass_filenames: false
        always_run: true
